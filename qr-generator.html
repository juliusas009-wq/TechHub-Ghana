<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator</title>

    <script>
        src="https://cdnjs.cloudflare.com/ajax/libs/qr.codejs/1.0.0/qrcode.min.js"></Script>

        <style>
            BODY {
                font-family: arial, sans-serif;
                background-color: #f4f6f9;
                text-align: center;
                padding: 50px;
            }

            .container {
                max-width: 600px;
                margin: auto;
                background-color: white;
                padding: 30px;
                border-radius: 12px;
                box-shadow: 0 2px 10px rgba(0, 0, 0, 1);
            }

            input {
                width: 80px;
                padding: 12px;
                margin: 15px 0;
            }
            button {
                padding: 12px 20px;
                background-color: #2563EB;
                color: white;
                border: none;
                border-radius: 5px;
                cursor: pointer;
            }

            #qrcode {
                margin-top: 20px;
                display: flex;
                justify-content: center;
            }

            </style>
</head>
<body>
    <div class="container">

        <h1>QR Code Generator</h1>

        <p>Enter a website link, text, phone number, or email.</p>

        <input
        type="text"
        id="qrText"
        placeholder="https://example.com">

        <br><div>

        <button onclick="generateQR()">
            Generate QR Code
        </button>

        <!-- QR code will appear here -->

        <div id="qrcode"></div>

    </div>

    <script>
        function generateQR() {
            document.getElementById("qrcode"). innerHTML = "";

            let text =
            document.getElementById("qrText").value;

            new QRCode(
                document.getElementById("qrcode"),
            
        {
            text: text,
            width: 200,
            height: 200
        }
    );
        }
        </script>

</body>
</html>
