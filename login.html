<section class="login-section">


<div class="login-box">


<h2>Login</h2>


<p>
Welcome back to TechHub Ghana
</p>



<form id="loginForm">


<label>
Email
</label>

<input 
type="email" 
id="loginEmail"
placeholder="Enter your email"
required>



<label>
Password
</label>

<input 
type="password"
id="loginPassword"
placeholder="Enter your password"
required>



<button type="submit">
Login
</button>



</form>



<p>

Don't have an account?

<a href="signup.html">
Create Account
</a>

</p>
