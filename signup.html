<!DOCTYPE html>
<html lang="en">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Signup | TechHub Ghana</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header>

<div class="top-bar">

<div class="logo">

<img src="images/logo.png" alt="TechHub Ghana Logo">

<div>

<h1>TechHub Ghana</h1>

<p>Technology • Learning • Innovation</p>

</div>

</div>

</div>



<nav>

<a href="index.html">Home</a>

<a href="news.html">News</a>

<a href="tutorials.html">Tutorials</a>

<a href="tools.html">Tools</a>

<a href="about.html">About</a>

<a href="contact.html">Contact</a>

</nav>

</header>




<section class="login-section">


<div class="login-box">


<h2>Create Account</h2>


<p>
Join TechHub Ghana today
</p>



<form id="signupForm">


<label>
Full Name
</label>

<input 
type="text"
id="username"
placeholder="Enter your name"
required>




<label>
Email
</label>

<input 
type="email"
id="email"
placeholder="Enter your email"
required>




<label>
Password
</label>

<input 
type="password"
id="password"
placeholder="Create password"
required>




<button type="submit">
Create Account
</button>



</form>



<p>

Already have an account?

<a href="login.html">
Login
</a>

</p>


</div>


</section>





<footer>

<p class="copyright">

© 2026 TechHub Ghana. All Rights Reserved.

</p>

</footer>




<script src="dashboard.js"></script>


</body>

</html>
