<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPA Calculator | Student Tech Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navigation -->
    <nav>
        <div class="logo">💻 Student Tech Hub</div>

        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="tools.html">Tools</a>
            <a href="fashion.html">Fashion</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>

    <!-- GPA Calculator -->
    <div class="container">

        <h1>🎓 GPA Calculator</h1>
        <p>Enter your marks and credit hours for each course.</p>

        <table>
            <tr>
                <th>Course</th>
                <th>Mark (%)</th>
                <th>Credit Hour</th>
            </tr>

            <tr>
                <td>Course 1</td>
                <td><input type="number" id="mark1" min="0" max="100"></td>
                <td><input type="number" id="credit1" min="1" value="3"></td>
            </tr>

            <tr>
                <td>Course 2</td>
                <td><input type="number" id="mark2" min="0" max="100"></td>
                <td><input type="number" id="credit2" min="1" value="3"></td>
            </tr>

            <tr>
                <td>Course 3</td>
                <td><input type="number" id="mark3" min="0" max="100"></td>
                <td><input type="number" id="credit3" min="1" value="3"></td>
            </tr>

            <tr>
                <td>Course 4</td>
                <td><input type="number" id="mark4" min="0" max="100"></td>
                <td><input type="number" id="credit4" min="1" value="3"></td>
            </tr>

            <tr>
                <td>Course 5</td>
                <td><input type="number" id="mark5" min="0" max="100"></td>
                <td><input type="number" id="credit5" min="1" value="3"></td>
            </tr>

            <tr>
                <td>Course 6</td>
                <td><input type="number" id="mark6" min="0" max="100"></td>
                <td><input type="number" id="credit6" min="1" value="3"></td>
            </tr>

            <tr>
                <td>Course 7</td>
                <td><input type="number" id="mark7" min="0" max="100"></td>
                <td><input type="number" id="credit7" min="1" value="3"></td>
            </tr>

            <tr>
                <td>Course 8</td>
                <td><input type="number" id="mark8" min="0" max="100"></td>
                <td><input type="number" id="credit8" min="1" value="3"></td>
            </tr>

        </table>

        <br>

        <button onclick="calculateGPA()">Calculate GPA</button>

        <h2 id="result"></h2>

    </div>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 TechHub Ghana. All Rights Reserved.</p>
    </footer>

<script>

function getGradePoint(mark){

    if(mark >= 80) return 4.0;
    if(mark >= 75) return 3.5;
    if(mark >= 70) return 3.0;
    if(mark >= 65) return 2.5;
    if(mark >= 60) return 2.0;
    if(mark >= 55) return 1.5;
    if(mark >= 50) return 1.0;

    return 0.0;

}

function calculateGPA(){

    let totalPoints = 0;
    let totalCredits = 0;

    for(let i = 1; i <= 8; i++){

        let mark = Number(document.getElementById("mark"+i).value);
        let credit = Number(document.getElementById("credit"+i).value);

        if(mark === "" || mark < 0 || mark > 100){

            alert("Please enter valid marks (0 - 100).");
            return;

        }

        totalPoints += getGradePoint(mark) * credit;
        totalCredits += credit;

    }

    let gpa = totalPoints / totalCredits;

    document.getElementById("result").innerHTML =
    "🎉 Your GPA is: <strong>" + gpa.toFixed(2) + "</strong> / 4.00";

}

</script>

</body>
</html>
