<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>

<nav>

<h1>GPA Calculator</h1>

<p>Enter your grades:</p>

<input type="number" id="course1" placeholder="Course 1 Grade">
<br><br>

<input type="number" id="course2" placeholder="Course 2 Grade">
<br><br>

<input type="number" id="course3" placeholder="Course 3 Grade">
<br><br>

<input type="number" id="course4" placeholder="Course 4 Grade">
<br><br>

<input type="number" id="course5" placeholder="Course 5 Grade">
<br><br>

<input type="number" id="course6" placeholder="Course 6 Grade">
<br><br>    

<input type="number" id="course7" placeholder="Course 7 Grade">
<br><br>

<input type="number" id="course8" placeholder="Course 8 Grade">
<br><br>

<button onclick="calculateGPA()">Calculate GPA</button>

<h2 id="result"></h2>

<script>
function calculateGPA() {
    let c1 =
    Number(document.getElementById("course1").value);
    let c2 =
    Number(document.getElementById("course2").value);
    let c3 =
    Number(document.getElementById("course3").value);
    let c4 =
    Number(document.getElementById("course4").value);
    let c5 =
    Number(document.getElementById("course5").value);
    let c6 =
    Number(document.getElementById("course6").value);
    let c7 =
    Number(document.getElementById("course7").value);
    let c8 =
    Number(document.getElementById("course8").value);

    let gpa = (c1 + c2 + c3 + c4 + c5 + c6 + c7 + c8) / 8;
    document.getElementById("result").innerHTML = "Your GPA is: " + gpa.toFixed(2);
}
</script>
</body>
</html>
